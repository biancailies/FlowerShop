# Application Name
spring.application.name=NotificationService

# Server port
server.port=8085

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/notification_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.open-in-view=false

# Real email configuration
# For Gmail use an app password, not your normal account password.
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:biailies10@gmail.com}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

notification.mail.from=${MAIL_FROM:${spring.mail.username}}
notification.mail.default-recipient=${MAIL_DEFAULT_RECIPIENT:}
notification.mail.subject=${MAIL_SUBJECT:BloomChain notification}

# Discord bot notification configuration
notification.discord.bot-token=${DISCORD_BOT_TOKEN:}
notification.discord.default-channel-id=${DISCORD_CHANNEL_ID:1506379643803140278}
notification.discord.api-base-url=${DISCORD_API_BASE_URL:https://discord.com/api/v10}
